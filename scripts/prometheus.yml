global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    instance: "emily-local"

scrape_configs:
  - job_name: "emily"
    static_configs:
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
